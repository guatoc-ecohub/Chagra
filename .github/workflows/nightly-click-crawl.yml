name: Nightly Click Crawl

# Crawl nocturno de la app completa: recorre todas las rutas y secciones
# clickeables para detectar regresiones silenciosas (pantallas rotas, 404,
# errores JS no catched). Corre en schedule diario 02:30 Colombia + on-demand.
# Complementa a playwright.yml (E2E offline-first) y no depende de
# visual-regression.yml (screenshots comparativos).

on:
  schedule:
    # 02:30 America/Bogota = 07:30 UTC.
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  click-crawl:
    name: App-wide click crawl
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run nightly click crawl
        run: npm run test:e2e -- tests/nightly-click-crawl.spec.js
        env:
          CI: '1'
          RUN_NIGHTLY_CLICK_CRAWL: '1'
          VITE_FARMOS_URL: ''
          VITE_FARMOS_CLIENT_ID: farm

      - name: Run E2E nocturno validación
        run: npm run test:e2e -- tests/e2e-nocturno-validacion.spec.js
        env:
          CI: '1'
          RUN_NOCTURNO_VALIDACION: '1'
          PLAYWRIGHT_BASE_URL: 'http://localhost:5173'
          CHAGRA_USER: ${{ secrets.CHAGRA_USER || 'demo' }}
          CHAGRA_PASS: ${{ secrets.CHAGRA_PASS }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-click-crawl-report
          path: |
            playwright-report/
            screenshots/nocturno-validacion/
          retention-days: 14
