name: Nightly Click Crawl

on:
  schedule:
    # 02:30 America/Bogota = 07:30 UTC.
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  click-crawl:
    name: App-wide click crawl
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run nightly click crawl
        run: npm run test:e2e -- tests/nightly-click-crawl.spec.js
        env:
          CI: '1'
          RUN_NIGHTLY_CLICK_CRAWL: '1'
          VITE_FARMOS_URL: ''
          VITE_FARMOS_CLIENT_ID: farm

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-click-crawl-report
          path: playwright-report/
          retention-days: 14
