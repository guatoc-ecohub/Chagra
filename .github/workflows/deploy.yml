name: Deploy Chagra PWA

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

# Concurrency: serializa deploys del mismo branch — evita 2 pushes a main en
# paralelo corrompiendo /mnt/fast/appdata/farmos-pwa/ a mitad del rsync.
# cancel-in-progress: false porque queremos que cada deploy termine, no
# perder uno de los dos.
concurrency:
  group: deploy-chagra-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: [self-hosted, alpha]
    # Cap defensivo: build + rsync + verify típicamente <2min. 30min cubre
    # picos de npm install lento o caché HA HTTP timeout.
    timeout-minutes: 30
    steps:
      - name: Detect runner identity
        # Detonante 2026-05-03: ADR-024 introdujo `claude-runner` con labels
        # [alpha, nixos, claude-runner]. chagra-deploy runner tiene [alpha, nixos]
        # → ambos matchean `runs-on: [self-hosted, alpha]` y GitHub asigna
        # cualquiera. claude-runner NO tiene rsync en su PATH → deploy falla
        # con exit 127 → email "Deploy failed" spammea al operador.
        # Fix durable en la config IaC remueve `alpha` de claude-runner labels
        # (nixos-rebuild pendiente). Fix runtime acá: setear flag SKIP_DEPLOY
        # y saltar todos los steps posteriores con `if:` conditional para que
        # el job termine con success — sin email spam y sin rsync inválido.
        run: |
          if echo "$HOME" | grep -q claude-runner; then
            echo "::warning::Job matcheado al claude-runner ($HOME) — sin rsync. Skipping (success). Re-pushear si querés forzar otro draw del runner."
            echo "SKIP_DEPLOY=1" >> "$GITHUB_ENV"
          else
            echo "Runner OK ($HOME) — procediendo con deploy."
          fi

      - if: env.SKIP_DEPLOY != '1'
        uses: actions/checkout@v4
        # fetch-depth: 0 = clone COMPLETO (no shallow). El default de
        # actions/checkout@v4 es fetch-depth 1 (shallow), con lo que
        # `git rev-list --count HEAD` del step "Set deploy-time version"
        # cuenta SIEMPRE 1 → la versión quedaba pegada en `1.0.1` sin
        # avanzar pese a cada deploy. Con el historial completo el count
        # da el número real de commits (~185), produciendo una versión
        # monotónica `1.0.<count>` única por deploy.
        with:
          fetch-depth: 0

      - if: env.SKIP_DEPLOY != '1'
        name: Install dependencies
        run: npm ci

      # 2026-06-24 — RAÍZ del "prod vieja N días": el step Lint corría eslint con
      # NODE_OPTIONS=--max-old-space-size=16384 (16GB de heap) en una caja de 16GB.
      # Con ollama (~7GB @ num_ctx 8192) + el build cargados, eslint OOM-mata al
      # RUNNER a mitad del job -> todos los steps desde 'Lint' quedan VACÍOS ->
      # el run = completed/failure -> nunca llega a build+rsync -> prod congelada
      # (06-22 → 06-24). continue-on-error NO salva: el crash mata al runner
      # entero, no al step. El lint NO pertenece al deploy: ya lo enforza lefthook
      # pre-commit (eslint max-warnings=0, no se puede commitear sucio) y el branch
      # `qa` (qa-deploy.yml). El deploy ahora = checkout + npm ci + build + rsync
      # (liviano, sin eslint OOM). Gate de calidad = donde debe estar: el commit/PR.

      - if: env.SKIP_DEPLOY != '1'
        name: Set deploy-time version
        # Bump de versión movido de pre-commit (lefthook auto-bump-version) a
        # deploy-time para eliminar colisiones entre PRs paralelos — raíz del
        # "versión pegada" (label v1.0.32 congelado, no avanzaba pese a deploys).
        # Versión monotónica 1.0.<commit-count>, única por deploy: el label
        # v{APP_VERSION} (TopBar/LoginScreen leen package.json baked en build)
        # siempre avanza. El CACHE_NAME del SW lo bumpea el step post-deploy.
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COUNT}"
          npm pkg set version="$VERSION"
          echo "Deploy version set to $VERSION"

      - if: env.SKIP_DEPLOY != '1'
        name: Build
        run: npm run build
        env:
          # SHA del build para el self-heal por versión (versionCheck.js lo lee
          # como __BUILD_SHA__ vía vite define, y vite emite dist/version.json
          # con él). DEBE alinearse con el `chagra-<sha>` que deja el step "Bump
          # SW cache version" (ambos = `git rev-parse --short HEAD`) para que el
          # smoke post-deploy (chequeo A) vea coincidencia SW/bundle.
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_FARMOS_URL: ""
          VITE_FARMOS_CLIENT_ID: farm
          # Operador: username inyectado en build desde secret (anti-leak: NUNCA
          # hardcodeado en el source publico). Habilita esOperador -> vision total.
          VITE_OPERATOR_USERNAME: ${{ secrets.OPERATOR_USERNAME }}
          # Sidecar agro-mcp (ADR-045 fase 2) activado en produccion 2026-05-23.
          # Con flag true, AgentScreen rutea cada turno por NLU del sidecar y,
          # si el planner detecta agro-query, llama al tool MCP antes del chat.
          # Si sidecar timeout/5xx/red caida, sidecarClient devuelve null y el
          # comportamiento es identico al pre-wiring.
          VITE_USE_SIDECAR_AGRO_MCP: "true"
          # GO-LIVE 2026-07-04: home finca-viva a produccion (biopunk2 default,
          # biopunk original de respaldo). Autorizado por el operador. Antes solo
          # en dev-deploy.yml; ahora prod renderiza el home de 4 portales + escenas
          # vivas por tema en vez del home oscuro tipo agente.
          VITE_FINCA_VIVA_HOME_PERFIL: "true"
          # Captura server-side de conversaciones del agente para la auditoría
          # diaria (review de respuestas en todas las aristas). Doble gate: esta
          # flag + hasConsent() por usuario (privacy-first). PII completa (sin
          # VITE_CAPTURE_ANONYMIZE); el store cae en /var/lib/agro-mcp/conversations
          # (fuera del rsync --delete del deploy). Habeas Data: Ley 1581.
          VITE_CAPTURE_CONVERSATIONS: "true"
          # Token X-Chagra-Token shared-secret. NOTA: termina en bundle JS
          # publico - defense-in-depth, NO auth real (auth real = nginx CORS
          # lockdown). Sincronizado con SOPS de alpha; rotacion coordinada.
          VITE_CHAGRA_MCP_TOKEN: ${{ secrets.VITE_CHAGRA_MCP_TOKEN }}
          # MODO CAMPO / manos libres (#2088): wake-word "hola chagra" (TF.js
          # speech-commands, on-device, offline — el audio NUNCA sale del
          # dispositivo). Antes shippeado "dark" (flag ausente ⇒ off); el
          # operador lo validó en dev y autorizó verlo en prod (2026-07-05).
          # Con true, aparece el panel "Modo campo" en Perfil → pestaña de voz.
          # Los assets vendoreados (TF.js/modelo, ~9 MB) NO se precachean:
          # cache-on-use del SW (WAKE_WORD_PATH_PREFIXES) al activarlo online.
          VITE_MODO_CAMPO: "true"
          # AVATAR-ESPIRITU / módulos Pro (chagra #2210 + chagra-pro #304):
          # ruta del bundle Pro pre-construido servido desde el MISMO origen
          # (mismo-origin ⇒ CSP script-src 'self' lo cubre). loadProModules.js
          # hace import() dinámico de `${VITE_PRO_MODULES_PATH}/<mod>/index.js`.
          # Los bundles viven en /mnt/fast/appdata/farmos-pwa/pro-modules/ (montados
          # manualmente en alpha, FUERA del repo público — anti-leak OSS/Pro). Si
          # el path no resuelve, el import falla en silencio (try/catch) y la UI
          # degrada: build puro OSS sin Pro. Preservado del rsync --delete abajo.
          VITE_PRO_MODULES_PATH: "/pro-modules"

      - if: env.SKIP_DEPLOY != '1'
        name: Deploy to production
        # El destino /mnt/fast/appdata/farmos-pwa es propiedad de 'kortux'
        # (grupo compartido chagra-deploy con setgid 2775). El runner pertenece
        # al grupo y puede escribir/renombrar archivos, pero utime/chmod/chown
        # sobre dirs ajenos requiere ser owner → rsync aborta con exit 23 si
        # intenta preservar esas propiedades.
        #
        # Flags defensivos para este destino multi-owner:
        #   -O              omit-dir-times (no utime sobre dirs existentes)
        #   --no-perms      no sync de perms con el source (dirs mantienen 2775)
        #   --no-group      no preservar grupo del source
        #   --chmod=F644    perms explicitos SOLO en archivos nuevos; dirs
        #                   nuevos heredan el setgid del padre (= chagra-deploy)
        #
        # `umask 022` antes del rsync: el servicio systemd del runner hereda
        # umask 077 y rsync respeta el umask del proceso padre; sin este
        # `umask 022`, los archivos nuevos quedaban 600 a pesar del --chmod,
        # lo que bloqueaba a Nginx (403 Forbidden) y dejaba prod con pantalla
        # blanca tras cada deploy. El chmod posterior es defensa en
        # profundidad: se aplica solo a archivos cuyo owner es runner (los
        # que creo este deploy), no toca dirs ajenos.
        #
        # /assets/ es append-only (estrategia en 3 pasos):
        #   Bug previo: un solo `rsync --delete dist/ TARGET/` borraba los
        #   chunks hasheados `/assets/*-<hash>.js` que ya no estaban en el build
        #   nuevo. Una PWA instalada con un Service Worker viejo sirve un
        #   index.html cacheado que apunta a esos chunks ya borrados -> el
        #   cliente falla con "failed to fetch" (pantalla rota) hasta reinstalar.
        #   El SW no hace skipWaiting (queda en waiting + prompt de update), asi
        #   que el cliente viejo sigue activo y necesita que SUS chunks existan.
        #   Fix:
        #     1) rsync del dist completo CON --delete pero --exclude='/assets/':
        #        actualiza index.html, sw.js, manifest, etc. (nombres NO
        #        hasheados) y limpia basura no-hasheada. Estos son justo los
        #        archivos que disparan el update del SW.
        #     2) rsync de dist/assets/ a TARGET/assets/ SIN --delete: agrega los
        #        chunks nuevos y conserva los viejos (los hashes nunca colisionan,
        #        acumular es seguro) para que clientes/SW viejos sigan cargando.
        #     3) GC de chunks viejos para no crecer infinito: borra archivos en
        #        TARGET/assets/ con mtime > 30 dias. 30 dias cubre de sobra el
        #        tiempo para que un cliente instalado se actualice.
        #
        # /pro-modules/ es montado manualmente en el docroot (bundles Pro pre-
        # construidos de chagra-pro, NO viven en el repo público → no están en
        # dist/). Sin excluirlo, `rsync --delete` lo consideraría "sobrante" y lo
        # borraría en cada deploy (mismo patrón que los manuales de escotillas que
        # ya se perdieron). `--exclude='/pro-modules/'` lo preserva (ADR-002 +
        # VITE_PRO_MODULES_PATH arriba).
        run: |
          umask 022
          rsync -avzO --no-perms --delete --no-group --chmod=F644 --exclude='/assets/' --exclude='/pro-modules/' dist/ /mnt/fast/appdata/farmos-pwa/
          rsync -avzO --no-perms --no-group --chmod=F644 dist/assets/ /mnt/fast/appdata/farmos-pwa/assets/
          find /mnt/fast/appdata/farmos-pwa/assets/ -type f -mtime +30 -delete || true
          find /mnt/fast/appdata/farmos-pwa -type f -user runner ! -perm 644 -exec chmod 644 {} + || true

      - if: env.SKIP_DEPLOY != '1'
        name: Verify deployment
        run: |
          test -f /mnt/fast/appdata/farmos-pwa/index.html || exit 1
          HASH=$(sha256sum /mnt/fast/appdata/farmos-pwa/index.html | cut -d' ' -f1)
          echo "Deploy OK: $(date -Iseconds) | index.html sha256: ${HASH:0:12}"

      - if: env.SKIP_DEPLOY != '1'
        name: Notify HA to refresh Nest Hub
        # `jq -r` reemplaza `node -p "require('./package.json').version"` —
        # node -p evalúa JS arbitrario; jq solo parsea JSON. Defensa contra
        # supply-chain compromise donde package.json sea modificado para
        # ejecutar código durante el deploy.
        run: |
          VERSION=$(jq -r .version package.json)
          COMMIT=$(git rev-parse --short HEAD)
          curl -s -X POST "http://localhost:8123/api/webhook/chagra_deployed" \
            -H "Content-Type: application/json" \
            -d "{\"version\":\"$VERSION\",\"commit\":\"$COMMIT\"}" \
            || echo "HA webhook not reachable (non-blocking)"
        continue-on-error: true

      - if: env.SKIP_DEPLOY != '1'
        name: Bump SW cache version
        # Patrón ERE sin literal 'v' — el cache en prod alterna entre
        # 'chagra-v<N>' (el que viene del repo) y 'chagra-<sha>' (el que
        # este paso deja tras cada deploy). Un patrón que requiera 'v'
        # solo matchearía el primer caso, y a partir del segundo deploy
        # el cache quedaría pegado al sha del deploy inicial. Con [0-9a-z]+
        # matchea ambas formas y el bump funciona en cada deploy.
        #
        # `sed` solo toca la PRIMERA ocurrencia de cada línea, y la línea 1 del
        # sw.js es `const CACHE_NAME = 'chagra-v<N>'` → es la que bumpeamos.
        # (RAG_GROUNDING_PREFIX/MAP_TILES_PREFIX viven en otras líneas con su
        # propio versionado v1; no se tocan al limitar el patrón con `0,/.../`.)
        run: |
          SW_FILE=/mnt/fast/appdata/farmos-pwa/sw.js
          VERSION_FILE=/mnt/fast/appdata/farmos-pwa/version.json
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          if [ -f "$SW_FILE" ]; then
            # Reemplazo ACOTADO al primer match de la línea `const CACHE_NAME`
            # (línea 1-2 de sw.js). El patrón `chagra-[0-9a-z]+` matchea tanto
            # 'chagra-v<N>' (inicial) como 'chagra-<sha>' (tras deploys previos).
            # 0,/regex/ limita al PRIMER match del archivo entero; el resto de
            # cachés (RAG_GROUNDING_PREFIX, MAP_TILES_PREFIX) no se tocan.
            sed -i -E "0,/const CACHE_NAME = .chagra-[0-9a-z]+/s/chagra-[0-9a-z]+/chagra-${COMMIT_SHORT}/" "$SW_FILE"
            echo "SW cache bumped to chagra-${COMMIT_SHORT}"
          fi
          # version.json: alinear el SHA SERVIDO con el CACHE_NAME recién bumpeado
          # para que el self-heal (versionCheck.js) y el smoke (chequeo A) vean
          # coincidencia exacta. Sobrescribe lo que vite emitió en el build.
          printf '{\n  "sha": "%s",\n  "builtAt": "%s"\n}\n' \
            "${COMMIT_SHORT}" "$(date -Iseconds)" > "$VERSION_FILE"
          echo "version.json sha=${COMMIT_SHORT}"

      - if: env.SKIP_DEPLOY != '1'
        name: Smoke post-deploy (self-heal + sesión)
        # Cierra el loop del prod-down "failed to fetch" + sesión zombi
        # (2026-06-18): corre Playwright crudo contra PROD verificando
        #   A) /version.json servido == SHA del bundle servido (desfase SW),
        #   B) cero "failed to fetch" + estado válido tras cargar+recargar,
        #   C) token inválido → re-login (no onboarding "¿dónde está su finca?").
        # NO bloquea el deploy (ya quedó publicado); si queda ROJO, el step
        # siguiente alerta por Telegram. Runner = NixOS alpha: chromium del
        # nix-store (el bundled de Playwright falla por libnspr4/libglib).
        id: smoke
        continue-on-error: true
        timeout-minutes: 8
        env:
          CHAGRA_URL: https://chagra.guatoc.co/
        run: |
          set -o pipefail
          # Resolver chromium del nix-store (memoria reference-playwright-nixos-setup).
          CHROMIUM_BIN="$(nix-shell -p chromium --run 'which chromium' 2>/dev/null | tail -1 || true)"
          if [ -z "$CHROMIUM_BIN" ]; then
            echo "::warning::chromium del nix-store no resuelto; smoke saltado (no bloqueante)."
            echo "smoke_status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export PLAYWRIGHT_CHROMIUM_PATH="$CHROMIUM_BIN"
          if node tests/e2e-real/sw-self-heal.smoke.mjs 2>&1 | tee /tmp/smoke.log; then
            echo "smoke_status=green" >> "$GITHUB_OUTPUT"
          else
            echo "smoke_status=red" >> "$GITHUB_OUTPUT"
            {
              echo "## Smoke post-deploy ROJO"
              echo ""
              echo "Self-heal / sesión zombi detectado en prod tras el deploy."
              echo '```'
              tail -40 /tmp/smoke.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - if: env.SKIP_DEPLOY != '1' && steps.smoke.outputs.smoke_status == 'red'
        name: Alertar smoke rojo (Telegram, no bloqueante)
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets no seteados; alerta saltada (no bloqueante)."
            exit 0
          fi
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          MSG="🔴 *Chagra smoke post-deploy ROJO* (${COMMIT_SHORT})
          Self-heal / sesión zombi falló en https://chagra.guatoc.co/
          Revisar: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # nix-shell -p curl: el runner NixOS no trae curl en el PATH del job.
          nix-shell -p curl --run "curl -sS -X POST \
            'https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage' \
            -d 'chat_id=${TELEGRAM_CHAT_ID}' \
            -d 'parse_mode=Markdown' \
            --data-urlencode \"text=${MSG}\"" \
            || echo "Telegram alerta falló (ignorado)."
