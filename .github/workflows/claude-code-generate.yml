name: Claude Code Generate

# Pipeline de generación autónoma — segunda etapa del flujo voice→tarea→código.
#
# Flujo completo:
#   1. claude-code-request.yml (issue labeled "claude-code-request") →
#      crea branch feat/issue-N-slug + abre draft PR con stub.
#   2. Operador revisa el draft PR. Si el alcance está claro, agrega label
#      "ready-to-generate" al PR. ESE GATE HUMANO ES OBLIGATORIO.
#   3. Este workflow dispara: corre Claude Code en self-hosted runner,
#      reemplaza el stub por la implementación real, hace push.
#   4. CI gates corren (codeql + playwright + lefthook).
#   5. Operador revisa el diff manualmente y mergea si OK.
#
# Aislación crítica:
#   - Runner self-hosted con label "claude-runner" (separado del runner
#     público ubuntu-latest y del runner de deploy). Provisionado
#     declarativamente fuera de este repo.
#   - User Linux dedicado claude-runner — sin acceso a otros secrets del
#     nodo, solo lee la API key vía EnvironmentFile del systemd service.
#   - Anthropic API key separada del plan personal del operador, vía
#     EnvironmentFile (NO via secrets de workflow → no aparece en logs ni
#     puede ser exfiltrada vía dump del context).
#   - Actor whitelist explícita: solo el operador o el bot pueden disparar.
#   - Tool whitelist explícita en claude CLI — bloquea WebFetch/WebSearch.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

# Concurrency: serializa runs para el MISMO PR. Si el operador agrega y quita
# y vuelve a agregar la label rápido, no hay race con git push.
concurrency:
  group: claude-code-generate-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  generate:
    # Triple gate: label correcta + actor whitelisted + PR sigue draft.
    if: |
      github.event.label.name == 'ready-to-generate'
      && (github.event.sender.login == vars.OPERATOR_LOGIN
          || github.event.sender.login == vars.CLAUDE_BOT_LOGIN)
      && github.event.pull_request.draft == true
    runs-on: [self-hosted, claude-runner]
    # 2026-05-15: bump 20→60min. Causa raíz observada: en runs.list de 3h se
    # vieron 161 jobs disparados con resultado 2 success + 37 cancelled.
    # journalctl github-runner-claude-code reveló patrón exacto: cada job
    # cancelado dura 20m20s (timeout hit). Nemotron (qwen2.5-coder-7b en CPU
    # Ryzen 4600G UMA) con prompts grandes (batch 3-5 incluyen datos
    # verificados extraídos del JSON existente) no alcanza el budget. 60min
    # cubre el peor caso observado en bench batch 1 (~10-15min típico).
    timeout-minutes: 60

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_BOT_PAT }}

      - name: Resolve linked issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          # SECURITY: bind PR body via env (no template injection en bash).
          # Buscar "Closes #N" o "Fixes #N" en el body para resolver el issue.
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oE '(Closes|Fixes|Resolves) #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          if [ -z "$ISSUE_NUM" ]; then
            echo "ERROR: No issue linkeado en el body del PR (esperaba 'Closes #N')." >&2
            exit 1
          fi
          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body')
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title --jq '.title')
          {
            echo "num=$ISSUE_NUM"
            echo "title<<EOF_TITLE"
            echo "$ISSUE_TITLE"
            echo "EOF_TITLE"
            echo "body<<EOF_BODY"
            echo "$ISSUE_BODY"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Build Claude Code prompt
        id: prompt
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.num }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          PROMPT_FILE="${RUNNER_TEMP}/claude-prompt.md"
          {
            echo "# Implementa el cambio descrito en el GitHub Issue #${ISSUE_NUM}"
            echo
            echo "## Título"
            echo
            echo "${ISSUE_TITLE}"
            echo
            echo "## Body completo del issue"
            echo
            echo "${ISSUE_BODY}"
            echo
            echo "## Reglas inviolables"
            echo
            echo "1. **NO modifiques** \`src/db/dbCore.js\`, \`src/services/syncManager.js\`, \`src/services/payloadService.js\`, ni \`public/sw.js\` salvo que el issue lo solicite explícitamente."
            echo "2. **NO bumpees** \`package.json\` version ni \`public/sw.js\` CACHE_NAME — eso lo hace el operador en el commit de release."
            echo "3. **Respeta el modelo de datos Asset+Log append-only** documentado en CONTRIBUTING.md y AGENTS.md: cualquier nuevo log debe usar la estructura existente, no inventar un schema nuevo."
            echo "4. **Respeta el boundary anti-leak**: opera SOLO en este repo. NO referencies recursos de repos privados, infra interna, ni hostnames LAN. Lo que documenta CONTRIBUTING.md §1-§2."
            echo "5. **Cero hardcoding** de URLs, IPs, tokens. Toda config externa via \`import.meta.env.VITE_*\` y proxy Nginx."
            echo "6. Si después de leer el código no tienes claridad sobre cómo implementar, EXIT 1 con mensaje en stdout que diga 'CLARIFICATION_NEEDED: <pregunta concreta>'. NO inventes."
            echo
            echo "## Tu tarea"
            echo
            echo "1. Lee el código relevante para entender el contexto."
            echo "2. Si existe el stub \`.requests/issue-${ISSUE_NUM}.md\`, BÓRRALO al final."
            echo "3. Implementa el cambio mínimo que cierra el issue."
            echo "4. Si el cambio toca componentes con tests, corre \`npm test\` y verifica que pasa."
            echo "5. Si el cambio es de UI, valida con \`npm run build\` que el bundle compila."
            echo "6. Cuando termines, deja un resumen de 3-5 líneas de qué cambiaste y por qué — eso queda en el commit message."
          } > "$PROMPT_FILE"
          echo "file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"
          echo "Prompt construido en $PROMPT_FILE ($(wc -l < $PROMPT_FILE) líneas)"

      - name: Run Claude Code
        id: claude
        env:
          # ANTHROPIC_API_KEY viene del EnvironmentFile del systemd service del
          # runner (claude-code-runner.nix) — NO se pasa por secrets de workflow
          # ni queda en logs.
          # LITELLM_MASTER_KEY (opcional): si el runner tiene acceso al secret
          # sops `litellm-master-key`, se habilita TIER0 (GLM-4.6 vía proxy
          # local). Mientras el operador no agregue ese EnvironmentFile en
          # claude-code-runner.nix, TIER0 se salta sin error y la chain arranca
          # en TIER1.
          PROMPT_FILE: ${{ steps.prompt.outputs.file }}
          OUTPUT_FILE: ${{ runner.temp }}/claude-output.json
        run: |
          set -o pipefail
          # =====================================================================
          # PIVOT 2026-05-09: backend cambiado de claude-code (Anthropic) a
          # opencode (multi-provider). Operador sin balance Anthropic API
          # pay-per-use. Intentos previos vía litellm-proxy a GLM-4.6: GLM
          # emitía tool calls como TEXTO → step "Commit and push" fallaba.
          # opencode/big-pickle (free) sí hacía tool calls correctos.
          #
          # PIVOT 2026-05-14: big-pickle con cola larga + silent failures →
          # cambio a opencode/nemotron-3-super-free.
          #
          # PIVOT 2026-05-16 (este): nemotron-3-super-free se cuelga >90s sin
          # responder en probes locales (`opencode run -m opencode/nemotron-3-
          # super-free` con prompt trivial). Hipótesis del operador: fin de
          # tokens free tier. Síntoma idéntico en GH Actions: 100% de runs del
          # día terminan failure/cancelled — los cortos (30-48s) fallan en
          # "Run Claude Code", los largos (1-10h) timeout. Catálogo congelado
          # en 176 species de 450 meta.
          #
          # Solución: CHAIN de modelos con fallback automático en vez de un
          # único modelo. Detección de fallo silencioso (sin edits reales)
          # como señal universal de "este tier no sirvió, probar siguiente".
          #
          # TIER0 (preferido, condicional): opencode/zai/glm-4.6 vía litellm-
          #   proxy local (z.ai Coding Plan pago, subutilizado por bot
          #   Telegram). Requiere LITELLM_MASTER_KEY en env del runner —
          #   sin esa env, este tier se salta limpio.
          # TIER1 (default): opencode/minimax-m2.5-free. Probado 2026-05-16
          #   en alpha: responde 1s, hace tool calls reales (write+bash
          #   verificados), cost 0, sin auth. Reemplaza a nemotron.
          #
          # Se quitaron `hy3-preview-free` y `nemotron-3-super-free` de la
          # chain: el primero no existe en opencode 1.14.35
          # (ProviderModelNotFoundError), el segundo cuelga.
          # =====================================================================

          run_tier() {
            local label="$1"
            local cmd_file="$2"
            local out_file="$3"
            local hard_timeout="$4"

            echo "::group::Tier $label"
            echo "Hard timeout: ${hard_timeout}s"
            local rc=0
            timeout "${hard_timeout}s" bash "$cmd_file" > "$out_file" 2>&1 || rc=$?
            echo "Exit code: $rc"
            echo "Output tail:"
            tail -c 2000 "$out_file" || true
            echo "::endgroup::"

            # Detectar fin de tokens / quota / rate-limit explícito en output.
            # Doble pasada para evitar falsos positivos (incidente 2026-05-16:
            # `429` matcheaba substring dentro de sessionIDs hex tipo `e329d…`
            # o números de output_tokens, marcando como quota runs que en
            # realidad solo tenían bash tool-call fallido por shell nologin).
            # Pasada 1: el output debe contener al menos UN indicador de error
            # estructural (campo "error", status code 4xx/5xx, HTTP error
            # line). Pasada 2: alguna palabra de quota debe aparecer.
            # Ambas deben pasar para clasificar como quota exhausted.
            if grep -qiE '"error"\s*:\s*"[^"]+"|"status"\s*:\s*"(error|failed|exhausted|quota[a-z_-]*|payment[a-z_-]*|rate[a-z_-]*|insufficient[a-z_-]*)"|"(status_code|code)"\s*:\s*[45][0-9]{2}|HTTP/[12]\.[01]\s+[45][0-9]{2}|"finish_reason"\s*:\s*"(length|content_filter)"' "$out_file" \
               && grep -qiE '\b(quota|rate[._-]?limit|insufficient[._ -]?(credit|balance|token)s?|payment[._ -]?required|free[._ -]?tier[._ -]?expired|out of (credits|tokens)|usage[._ -]?limit|too many requests|model not available)\b' "$out_file"; then
              echo "WARN tier $label: señal de quota exhausted detectada (error + keyword en output)." >&2
              return 10  # código reservado: quota
            fi

            # Pedido explícito de clarificación: no es fallo, se respeta.
            if grep -q "CLARIFICATION_NEEDED:" "$out_file"; then
              echo "CLAUDE_NEEDS_CLARIFICATION=true" >> "$GITHUB_ENV"
              echo "Tier $label: el agente pidió clarificación; no se intentan más tiers." >&2
              return 0
            fi

            # Detectar fallo silencioso: el agente "respondió" pero no tocó
            # archivos. Cubre (a) tool calls emitidos como texto (problema
            # histórico GLM), (b) modelo que solo describe sin actuar, (c)
            # timeout sin output útil.
            if [ -z "$(git status --porcelain)" ]; then
              echo "WARN tier $label: sin cambios en working tree (no edits reales)." >&2
              return 20  # código reservado: no edits
            fi

            return 0
          }

          # Construir scripts de cada tier en archivos temporales (no inline)
          # para mantener el bash legible y poder ejecutarlos bajo `timeout`.
          TIER0_CMD="${RUNNER_TEMP}/tier0.sh"
          TIER1_CMD="${RUNNER_TEMP}/tier1.sh"
          TIER0_OUT="${RUNNER_TEMP}/tier0-output.txt"
          TIER1_OUT="${RUNNER_TEMP}/tier1-output.txt"

          cat > "$TIER0_CMD" <<'TIER0_EOF'
          # TIER0: GLM-4.6 vía litellm-proxy local (claude-code CLI nativo).
          # litellm corre en alpha:4000 como podman-litellm-proxy.service y
          # expone /anthropic/v1/messages compatible. ZAI_API_KEY ya vive en
          # SOPS y el container lo monta. Lo único que falta para activar este
          # tier es exponer LITELLM_MASTER_KEY al user claude-runner.
          export ANTHROPIC_BASE_URL="http://127.0.0.1:4000"
          export ANTHROPIC_API_KEY="${LITELLM_MASTER_KEY}"
          claude-code \
            --dangerously-skip-permissions \
            --output-format=stream-json \
            --print < "$PROMPT_FILE"
          TIER0_EOF

          cat > "$TIER1_CMD" <<'TIER1_EOF'
          # TIER1: opencode/minimax-m2.5-free. Free tier opencode.ai, sin auth.
          opencode run \
            --dir "$GITHUB_WORKSPACE" \
            --dangerously-skip-permissions \
            -m opencode/minimax-m2.5-free \
            --format json \
            "$(cat "$PROMPT_FILE")"
          TIER1_EOF

          WINNER=""
          QUOTA_HIT=""

          # ─── TIER0 (condicional) ────────────────────────────────────────────
          if [ -n "${LITELLM_MASTER_KEY:-}" ] && command -v claude-code >/dev/null 2>&1; then
            if run_tier "0-glm46-litellm" "$TIER0_CMD" "$TIER0_OUT" 900; then
              cp "$TIER0_OUT" "$OUTPUT_FILE"
              WINNER="tier0-glm-4.6-via-litellm"
            else
              rc=$?
              [ "$rc" = "10" ] && QUOTA_HIT="${QUOTA_HIT}tier0(glm) "
              echo "TIER0 falló (rc=$rc). Probando TIER1." >&2
              git checkout -- . 2>/dev/null || true  # limpieza por si quedó algo a medias
            fi
          else
            echo "TIER0 skip: LITELLM_MASTER_KEY no presente o claude-code no instalado." >&2
          fi

          # ─── TIER1 (default) ────────────────────────────────────────────────
          if [ -z "$WINNER" ] && [ "${CLAUDE_NEEDS_CLARIFICATION:-false}" != "true" ]; then
            if run_tier "1-minimax-m2.5-free" "$TIER1_CMD" "$TIER1_OUT" 1500; then
              cp "$TIER1_OUT" "$OUTPUT_FILE"
              WINNER="tier1-minimax-m2.5-free"
            else
              rc=$?
              [ "$rc" = "10" ] && QUOTA_HIT="${QUOTA_HIT}tier1(minimax) "
              echo "TIER1 falló (rc=$rc)." >&2
            fi
          fi

          # ─── Resultado ──────────────────────────────────────────────────────
          echo "output=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"

          if [ "${CLAUDE_NEEDS_CLARIFICATION:-false}" = "true" ]; then
            echo "Resultado: clarificación pedida (sin push)."
            exit 0
          fi

          if [ -z "$WINNER" ]; then
            echo "::error::Toda la chain de modelos falló. Quota hits: ${QUOTA_HIT:-ninguno explícito}"
            # Concatenar outputs para audit aunque el job termine en failure
            {
              echo "=== TIER0 OUTPUT (si corrió) ==="
              [ -f "$TIER0_OUT" ] && cat "$TIER0_OUT" || echo "(no se intentó)"
              echo "=== TIER1 OUTPUT ==="
              [ -f "$TIER1_OUT" ] && cat "$TIER1_OUT" || echo "(no se intentó)"
            } > "$OUTPUT_FILE"
            echo "CHAIN_EXHAUSTED=true" >> "$GITHUB_ENV"
            echo "QUOTA_HIT=${QUOTA_HIT}" >> "$GITHUB_ENV"
            exit 1
          fi

          echo "WINNER_TIER=$WINNER" >> "$GITHUB_ENV"
          echo "Resultado: $WINNER produjo cambios reales."

      - name: Commit and push changes
        if: env.CLAUDE_NEEDS_CLARIFICATION != 'true'
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          ISSUE_NUM: ${{ steps.issue.outputs.num }}
          RUN_ID: ${{ github.run_id }}
          OUTPUT_FILE: ${{ steps.claude.outputs.output }}
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "noreply-claude-code@chagra.bio"

          # Si no hay cambios, Claude no editó nada — abortar.
          if [ -z "$(git status --porcelain)" ]; then
            echo "ERROR: Claude no produjo cambios; abortando push." >&2
            exit 1
          fi

          # Extraer summary del output. Cada tier escribe en formato distinto:
          # - claude-code stream-json: línea(s) JSON con .type=="assistant", .message.content[].text
          # - opencode --format json: stream con .type=="text", .part.text
          # Fallback: las últimas 500 chars del archivo. Nunca rompemos por jq.
          SUMMARY=$(jq -rs '
            [ .[]
              | select(.type=="text" or .type=="assistant")
              | (.part.text // (.message.content[]? | .text) // empty)
            ] | last // "Implementación generada por Claude Code."
          ' "$OUTPUT_FILE" 2>/dev/null | head -c 500)
          if [ -z "$SUMMARY" ] || [ "$SUMMARY" = "null" ]; then
            SUMMARY="Implementación generada por ${WINNER_TIER:-Claude Code}."
          fi

          git add -A
          git commit \
            -m "feat(issue-${ISSUE_NUM}): implementación auto-generada por Claude Code" \
            -m "${SUMMARY}" \
            -m "[claude-code-run #${RUN_ID}] [tier=${WINNER_TIER:-unknown}]"
          git push origin "$BRANCH"

      - name: Upload audit transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-output-${{ github.run_id }}
          path: ${{ steps.claude.outputs.output }}
          retention-days: 90

      - name: Comment on PR (audit chain)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          ISSUE_NUM: ${{ steps.issue.outputs.num }}
          REPO: ${{ github.repository }}
        run: |
          ARTIFACT_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          if [ "${CLAUDE_NEEDS_CLARIFICATION:-false}" = "true" ]; then
            STATUS="⚠️ Claude pidió clarificación — no hay cambios pusheados."
          elif [ "${CHAIN_EXHAUSTED:-false}" = "true" ]; then
            STATUS="❌ Chain de modelos agotada. Quota hits: \`${QUOTA_HIT:-ninguno explícito}\`. Ver logs."
          elif [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ Cambios pusheados al branch del PR (tier: \`${WINNER_TIER:-unknown}\`)."
          else
            STATUS="❌ Generación falló. Ver logs."
          fi
          BODY_FILE="${RUNNER_TEMP}/pr-comment.md"
          {
            echo "🤖 Claude Code Generate ejecutado."
            echo
            echo "- Run ID: [\`${RUN_ID}\`](${ARTIFACT_URL})"
            echo "- Issue: #${ISSUE_NUM}"
            echo "- Estado: ${STATUS}"
            echo "- Transcript: ver artifact \`claude-code-output-${RUN_ID}\` (retención 90d)"
            echo
            echo "**Próximo paso humano**: revisar el diff. Si OK, marcar el PR como ready-for-review (\`gh pr ready ${PR_NUM}\`)."
            echo
            echo "Re-disparar este workflow: re-aplicar la label \`ready-to-generate\`."
          } > "$BODY_FILE"
          gh pr comment "$PR_NUM" --body-file "$BODY_FILE"

      - name: Remove ready-to-generate label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          # La label se elimina automáticamente al fin (success o fail). Re-disparar
          # requiere re-aplicarla manualmente. Esto evita loops + obliga gate humano
          # entre cada intento.
          gh pr edit "$PR_NUM" --remove-label "ready-to-generate" || true

      - name: Notify agent via polling endpoint (non-blocking)
        if: always()
        env:
          CLAUDE_LINK_URL: ${{ vars.CLAUDE_LINK_URL }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_ID: ${{ github.run_id }}
          ISSUE_NUM: ${{ steps.issue.outputs.num }}
        run: |
          if [ -z "${CLAUDE_LINK_URL:-}" ]; then
            echo "CLAUDE_LINK_URL not set; skipping agent polling endpoint (non-blocking)"
            exit 0
          fi
          if [ "${CLAUDE_NEEDS_CLARIFICATION:-false}" = "true" ]; then
            STATUS="clarification"
            MESSAGE="Claude pidio clarificacion. Sin cambios pusheados."
          elif [ "${CHAIN_EXHAUSTED:-false}" = "true" ]; then
            STATUS="quota_exhausted"
            MESSAGE="Chain agotada. Quota hits: ${QUOTA_HIT:-ninguno explicito}."
          elif [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
            MESSAGE="Cambios generados y pusheados (tier=${WINNER_TIER:-unknown})."
          else
            STATUS="failed"
            MESSAGE="Generacion fallida. Ver logs del run."
          fi
          curl -sS -X POST "${CLAUDE_LINK_URL}/claude-code-run/${PR_NUM}/status" \
            -H "Content-Type: application/json" \
            -d "{\"run_id\": \"${RUN_ID}\", \"status\": \"${STATUS}\", \"pr_url\": \"${PR_URL}\", \"message\": \"${MESSAGE}\", \"issue_num\": \"${ISSUE_NUM}\", \"tier\": \"${WINNER_TIER:-}\"}" \
            || echo "Agent polling endpoint notification failed (ignored)"

      - name: Notify Telegram (non-blocking)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          RUN_ID: ${{ github.run_id }}
          ISSUE_NUM: ${{ steps.issue.outputs.num }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not set; skipping (non-blocking)"
            exit 0
          fi
          if [ "${CLAUDE_NEEDS_CLARIFICATION:-false}" = "true" ]; then
            STATUS="⚠️ pidió clarificación"
          elif [ "${CHAIN_EXHAUSTED:-false}" = "true" ]; then
            STATUS="🪫 chain agotada (quota: ${QUOTA_HIT:-?})"
          elif [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ push OK (tier=${WINNER_TIER:-?})"
          else
            STATUS="❌ falló"
          fi
          MSG="🤖 *Claude Code Generate* PR #${PR_NUM} (issue #${ISSUE_NUM})
          Estado: ${STATUS}
          Run: ${RUN_ID}
          PR: ${PR_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            || echo "Telegram notification failed (ignored)"
