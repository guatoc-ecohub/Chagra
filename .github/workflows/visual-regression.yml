name: Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: Regenerar y commitear baselines provisionales
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  visual:
    name: Playwright visual snapshots
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    timeout-minutes: 60
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    env:
      CI: '1'
      VITE_FARMOS_URL: ''
      VITE_FARMOS_CLIENT_ID: farm
      VITE_OPERATOR_USERNAME: op-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run visual comparison
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.update_snapshots == 'false' }}
        run: npx playwright test --project=visual

      - name: Regenerate visual baseline
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots == 'true' }}
        run: npx playwright test --project=visual --update-snapshots

      - name: Commit regenerated baseline
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "test(visual): update provisional baselines"
            git push
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diffs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: test-results/
          retention-days: 14
