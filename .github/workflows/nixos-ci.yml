name: NixOS CI/CD — Alpha

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ═══ Stage 1: Validar sintaxis Nix (rápido, no requiere secrets) ═══
  validate:
    runs-on: [self-hosted, alpha, infra]
    steps:
      - uses: actions/checkout@v4

      - name: Validate flake
        run: nix flake check --no-build 2>&1 | tail -20
        continue-on-error: true

      - name: Evaluate Alpha config
        run: nix eval .#nixosConfigurations.alpha.config.system.build.toplevel.drvPath

  # ═══ Stage 2: Dry-build (detecta errores de build sin aplicar) ═══
  build:
    needs: validate
    runs-on: [self-hosted, alpha, infra]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Dry-build Alpha
        run: |
          sudo nixos-rebuild dry-build --flake .#alpha 2>&1 | tail -30
          echo "Dry-build OK: $(date -Iseconds)"

  # ═══ Stage 3: Deploy (solo push a master, requiere build exitoso) ═══
  deploy:
    needs: build
    runs-on: [self-hosted, alpha, infra]
    if: github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Switch to new configuration
        run: |
          echo "═══ Deploying NixOS config to Alpha ═══"
          sudo nixos-rebuild switch --flake .#alpha 2>&1 | tail -40
          echo "═══ Deploy completed: $(date -Iseconds) ═══"

      - name: Verify services
        run: |
          echo "=== Service Status ==="
          systemctl is-active podman-ollama.service || true
          systemctl is-active github-runner-chagra-deploy.service || true
          systemctl is-active github-runner-nixos-deploy.service || true
          systemctl is-active openfang-personal.service 2>/dev/null || echo "openfang-personal: not yet active"
          systemctl is-active openfang-camilo.service 2>/dev/null || echo "openfang-camilo: not yet active"
          echo "=== Memory ==="
          free -h | head -2

      - name: Notify completion
        if: always()
        run: |
          STATUS=${{ job.status }}
          COMMIT=$(git rev-parse --short HEAD)
          echo "NixOS deploy ${STATUS}: commit ${COMMIT} on Alpha"
