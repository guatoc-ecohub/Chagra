name: NixOS CI — Alpha

# Filosofia (alineada con AI_PIPELINE_SOP):
#   * Infra NUNCA auto-deploya. El unlock manual de discos tras reboot implica
#     que si un `switch` mal tumba SSH o sops-nix, el operador debe estar
#     fisicamente en alpha para recuperar → incompatible con automatismo.
#   * PR hacia main = gate obligatorio bloqueante (validate + build dry-run).
#     Si falla cualquiera de los dos, el PR no puede mergearse.
#   * Merge a main = notificacion. El operador corre `sudo nixos-rebuild test`
#     en alpha, observa, y si OK promueve con `switch`. Nunca CI hace ese paso.
#   * Deploy manual opcional: workflow_dispatch con environment protegido puede
#     agregarse como bloque separado cuando haga falta — hoy no.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs previos del mismo branch en curso (ahorra tiempo del runner).
concurrency:
  group: nixos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══ Stage 1: Validar que el flake evalua sin errores ═══
  validate:
    name: Flake check (eval)
    runs-on: [self-hosted, alpha, nixos, infra]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: nix flake check
        # Bloqueante — cualquier fallo de eval mata el PR.
        #
        # NOTA: NO usamos --no-build porque el módulo upstream
        # nixos/modules/services/security/opensnitch.nix:198 hace
        # `builtins.readFile "${cfg.package}/etc/opensnitchd/default-config.json"`,
        # que requiere realizar el path del paquete en el /nix/store.
        # Con --no-build el realise está prohibido por diseño y el
        # check explota con "is not valid" / "realising the context of
        # path" (verificado runs 24975... → 25031... 2026-04-27/28).
        # El runner es self-hosted en alpha — opensnitch ya está en
        # /nix/store por uso productivo, así que la "build" se reduce
        # a un substitute desde caché local. Costo marginal despreciable.
        run: nix flake check --no-warn-dirty --show-trace

      - name: Evaluate alpha toplevel (drvPath)
        run: |
          nix eval --no-warn-dirty --raw \
            .#nixosConfigurations.alpha.config.system.build.toplevel.drvPath

  # ═══ Stage 2: Build dry-run del toplevel (detecta fallos reales de build) ═══
  build:
    name: Build alpha toplevel (no activation)
    needs: validate
    runs-on: [self-hosted, alpha, nixos, infra]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: nix build (no activation, no link)
        run: |
          nix build --no-link --print-out-paths --no-warn-dirty \
            .#nixosConfigurations.alpha.config.system.build.toplevel

  # ═══ Stage 3: Notificar cuando un merge a main queda listo para promover ═══
  # Este job NO activa nada. Solo deja constancia en los logs de CI de que la
  # nueva config paso el gate y esta lista para que el operador corra `test`
  # y luego `switch` manualmente desde alpha.
  notify-ready-to-deploy:
    name: Ready for manual rebuild test/switch
    needs: [validate, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, alpha, nixos, infra]
    steps:
      - uses: actions/checkout@v4
      - name: Emit ready marker
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          echo "═══════════════════════════════════════════════════════════"
          echo " Config en main (${COMMIT}) paso validate + build."
          echo ""
          echo " Para promover en alpha, SSH y corre (respeta el SOP):"
          echo "   cd ~/Workspace/guatoc-nixos && git pull"
          echo "   sudo nixos-rebuild test --flake .#alpha      # efimero"
          echo "   # observa 5-10 min; si OK:"
          echo "   sudo nixos-rebuild switch --flake .#alpha   # persistente"
          echo "═══════════════════════════════════════════════════════════"
