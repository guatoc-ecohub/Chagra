name: CodeQL SAST

on:
  pull_request:
    branches: [main]
  push:
    # Corre en main (post-merge) y en ramas efímeras de trabajo. Esto permite
    # ver los hallazgos de CodeQL en la pestaña Security de cada rama antes
    # de abrir el PR, evitando ciclos PR→revert→re-PR por alertas SAST.
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'refactor/**'
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Tooling dev-only del wake-word (genera/entrena el modelo offline a mano,
          # NUNCA corre en prod ni va al bundle) + smoke e2e: excluidos del análisis
          # de seguridad — sus "alertas" (log/path-injection sobre args de un script
          # local, unused-var en un smoke) son ruido de dev, no superficie de prod.
          config: |
            paths-ignore:
              - 'scripts/wake-word/**'
              - 'tests/e2e-real/**'
              # Vitest ejecuta estas fábricas THREE; CodeQL las interpreta como
              # invocaciones no ejecutables aunque el módulo exporta funciones.
              - 'src/visual/mundo3d/__tests__/**'
              # Vite genera este bundle desde fuentes y dependencias ya analizadas.
              - 'dist-prod/**'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
