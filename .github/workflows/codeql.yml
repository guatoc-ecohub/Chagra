name: CodeQL SAST

on:
  pull_request:
    branches: [main]
  push:
    # Corre en main (post-merge) y en ramas efímeras de trabajo. Esto permite
    # ver los hallazgos de CodeQL en la pestaña Security de cada rama antes
    # de abrir el PR, evitando ciclos PR→revert→re-PR por alertas SAST.
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'refactor/**'
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
