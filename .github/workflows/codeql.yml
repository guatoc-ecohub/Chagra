name: CodeQL SAST

on:
  pull_request:
    branches: [main]
  push:
    # Corre en main (post-merge) y en ramas efímeras de trabajo. Esto permite
    # ver los hallazgos de CodeQL en la pestaña Security de cada rama antes
    # de abrir el PR, evitando ciclos PR→revert→re-PR por alertas SAST.
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'refactor/**'
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Tooling dev-only del wake-word (genera/entrena el modelo offline a mano,
          # NUNCA corre en prod ni va al bundle) + smoke e2e: excluidos del análisis
          # de seguridad — sus "alertas" (log/path-injection sobre args de un script
          # local, unused-var en un smoke) son ruido de dev, no superficie de prod.
          config: |
            paths-ignore:
              # Tooling que corre en NUESTRA infra y jamás llega al navegador del
              # campesino: benches, scrapers e indexadores. Sus alertas medium
              # (file-access-to-http, http-to-file-access) describen justo lo que
              # hacen por diseño: leer un archivo y mandarlo a ollama, o bajar de
              # GBIF y escribir a disco. Se excluyen POR PATRÓN, no scripts/ entero:
              # scripts/seed-demo SÍ entra al bundle (src/main.jsx lo importa).
              - 'scripts/wake-word/**'
              - 'scripts/bench-*'
              - 'scripts/lib/bench-*'
              - 'scripts/scrape-*'
              - 'scripts/extract-*'
              - 'scripts/run-bench-*'
              - 'scripts/build-rag-*'
              - 'scripts/diag/**'
              - 'scripts/experimentos/**'
              - 'scripts/ml/**'
              - 'tests/e2e-real/**'
              - 'stress/**'
              - 'bench/**'
              - 'dist-prod/**'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
