<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <style>
      .circuit { fill: none; stroke: rgba(6,182,212,0.07); stroke-width: 1; stroke-linecap: round; }
      .fauna { fill: none; stroke: rgba(6,182,212,0.08); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .node { fill: rgba(6,182,212,0.06); stroke: none; }
    </style>
  </defs>

  <!-- === CIRCUITOS PCB === -->
  <g class="circuit">
    <path d="M0 300h60l8-8v-50l8-8h40l8 8v30l8 8h25"/>
    <path d="M300 0v55l-8 8h-40l-8 8v35"/>
    <path d="M600 280h-55l-8 8v45l-8 8h-35"/>
    <path d="M280 600v-50l8-8h45l8-8v-30"/>
    <path d="M150 150h40l8 8v40"/>
    <path d="M450 420h-35l-8-8v-35"/>
    <path d="M100 450l8-8h30l8-8v-25"/>
    <path d="M480 150l-8 8v30l-8 8h-30"/>
  </g>
  <g class="node">
    <circle cx="60" cy="300" r="3"/>
    <circle cx="300" cy="55" r="3"/>
    <circle cx="545" cy="288" r="3"/>
    <circle cx="288" cy="550" r="3"/>
    <circle cx="155" cy="155" r="2.5"/>
    <circle cx="450" cy="420" r="2.5"/>
    <circle cx="105" cy="450" r="2.5"/>
    <circle cx="480" cy="155" r="2.5"/>
    <circle cx="198" cy="198" r="2"/>
    <circle cx="415" cy="377" r="2"/>
  </g>

  <!-- === OSO ANDINO (Tremarctos ornatus) — arriba izq === -->
  <g class="fauna" transform="translate(55,60) scale(1.8)">
    <!-- Cabeza redonda con hocico corto -->
    <ellipse cx="30" cy="22" rx="18" ry="16"/>
    <!-- Orejas redondas -->
    <circle cx="15" cy="10" r="7"/>
    <circle cx="45" cy="10" r="7"/>
    <!-- Ojos con anteojos (marca facial característica) -->
    <circle cx="23" cy="20" r="4"/>
    <circle cx="37" cy="20" r="4"/>
    <path d="M19 20c-3-6 0-12 4-12m18 12c3-6 0-12-4-12"/>
    <!-- Hocico -->
    <ellipse cx="30" cy="30" rx="6" ry="4"/>
    <!-- Cuerpo robusto -->
    <path d="M12 36c-4 8-6 20-4 30s8 18 22 18 20-8 22-18 0-22-4-30"/>
    <!-- Patas -->
    <path d="M16 82c-2 6-1 12 3 14m22-14c2 6 1 12-3 14"/>
  </g>

  <!-- === MAZORCA DE MAÍZ — arriba der === -->
  <g class="fauna" transform="translate(420,40) scale(1.6)">
    <!-- Forma de la mazorca -->
    <path d="M30 10c-8 0-14 8-14 20v35c0 12 6 20 14 20s14-8 14-20V30c0-12-6-20-14-20z"/>
    <!-- Granos (filas) -->
    <path d="M20 25h20m-20 8h20m-20 8h20m-20 8h20m-20 8h20m-20 8h20"/>
    <!-- Líneas verticales de granos -->
    <path d="M25 20v50m10-50v50"/>
    <!-- Hojas de la tusa -->
    <path d="M16 15c-8-5-15-3-18 5m32-5c8-5 15-3 18 5"/>
    <path d="M14 10c-10-8-18-5-20 2m32-2c10-8 18-5 20 2"/>
  </g>

  <!-- === BORUGO (Cuniculus paca) — abajo izq === -->
  <g class="fauna" transform="translate(60,410) scale(1.6)">
    <!-- Cuerpo ovalado robusto -->
    <ellipse cx="45" cy="35" rx="35" ry="22"/>
    <!-- Cabeza -->
    <ellipse cx="8" cy="30" rx="12" ry="10"/>
    <!-- Ojo -->
    <circle cx="5" cy="27" r="2"/>
    <!-- Oreja pequeña -->
    <path d="M12 20c2-5 6-7 9-5"/>
    <!-- Patas cortas -->
    <path d="M25 55v10m15 0v-10m20 10v-10m12 0v-10"/>
    <!-- Manchas laterales (franjas) -->
    <path d="M30 25c5 3 10 3 15 0m-17 8c6 4 12 4 18 0m-19 8c7 4 13 4 20 0"/>
    <!-- Cola corta -->
    <path d="M78 32c4 0 6 2 5 5"/>
  </g>

  <!-- === PAVA ANDINA (Penelope montagnii) — der medio === -->
  <g class="fauna" transform="translate(430,195) scale(1.7)">
    <!-- Cuerpo -->
    <ellipse cx="40" cy="40" rx="25" ry="18"/>
    <!-- Cuello largo -->
    <path d="M18 30c-6-8-8-20-5-30"/>
    <!-- Cabeza -->
    <circle cx="10" cy="-2" r="8"/>
    <!-- Ojo -->
    <circle cx="7" cy="-3" r="2"/>
    <!-- Pico -->
    <path d="M2 -2l-8 2l8 3"/>
    <!-- Cresta/copete -->
    <path d="M12 -10c2-5 6-8 10-7"/>
    <!-- Cola larga -->
    <path d="M62 35c10 5 18 15 20 25m-20-28c8 8 14 20 14 30"/>
    <!-- Patas -->
    <path d="M30 56v16m-3 0h6m10-16v16m-3 0h6"/>
    <!-- Papada (barbilla roja) -->
    <path d="M8 6c-3 3-3 7 0 8"/>
  </g>

  <!-- === MORPHO BUTTERFLY (Morpho menelaus) — centro === -->
  <g class="fauna" transform="translate(240,250) scale(2)">
    <!-- Cuerpo central -->
    <line x1="30" y1="10" x2="30" y2="50"/>
    <!-- Antenas -->
    <path d="M30 10c-5-8-12-10-15-8m15 8c5-8 12-10 15-8"/>
    <!-- Ala superior izquierda -->
    <path d="M30 18c-8-5-22-8-28-2s-4 16 4 22c5 4 14 5 20 1"/>
    <!-- Ala superior derecha -->
    <path d="M30 18c8-5 22-8 28-2s4 16-4 22c-5 4-14 5-20 1"/>
    <!-- Ala inferior izquierda -->
    <path d="M30 35c-6 2-16 8-18 16s2 14 10 14c5 0 10-4 12-10"/>
    <!-- Ala inferior derecha -->
    <path d="M30 35c6 2 16 8 18 16s-2 14-10 14c-5 0-10-4-12-10"/>
    <!-- Venas de las alas -->
    <path d="M30 22l-15-2m15 8l-18 8m15-6l18 8m-15-14l15-2"/>
  </g>

  <!-- === ESCARABAJO HÉRCULES (Dynastes hercules) — abajo der === -->
  <g class="fauna" transform="translate(410,430) scale(1.8)">
    <!-- Cuerpo (élitros) -->
    <ellipse cx="30" cy="35" rx="18" ry="22"/>
    <!-- Línea media de los élitros -->
    <line x1="30" y1="15" x2="30" y2="55"/>
    <!-- Protórax -->
    <path d="M18 15h24c3 0 5-2 5-5v-2H13v2c0 3 2 5 5 5z"/>
    <!-- Cuerno superior (macho) — largo y curvo -->
    <path d="M30 8c0-8 2-18 5-25s6-10 8-10"/>
    <!-- Cuerno inferior (del protórax) -->
    <path d="M30 8c-2-6-1-15 3-20"/>
    <!-- Cabeza -->
    <rect x="22" y="5" width="16" height="10" rx="4"/>
    <!-- Patas (3 pares) -->
    <path d="M14 25l-10-5m-1 1l-4 6"/>
    <path d="M12 35l-12 0m0 1l-3 6"/>
    <path d="M14 45l-10 5m0 1l-2 7"/>
    <path d="M46 25l10-5m1 1l4 6"/>
    <path d="M48 35l12 0m0 1l3 6"/>
    <path d="M46 45l10 5m0 1l2 7"/>
  </g>
</svg>
