# Chagra pГєblico вЂ” lefthook config
# Instalar: npx lefthook install (corre automГЎticamente vГ­a postinstall)
# ADR-002 + ADR-015

pre-commit:
  parallel: true
  commands:
    secret-scan:
      tags: security
      run: |
        # Excluye archivos que DEFINEN las reglas (contienen patterns como
        # texto literal, no como secreto real): las listas anti-leak, el
        # propio lefthook, y el CONTRIBUTING.md que las documenta.
        hits=$(git diff --cached -- . ':!oss-pro/PROHIBITED*' ':!lefthook.yml' ':!CONTRIBUTING.md' | grep -iE "(gh[oprsu]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{32,}|sk-ant-[A-Za-z0-9_-]{30,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|glpat-[0-9A-Za-z_-]{20}|BEGIN (RSA|OPENSSH) PRIVATE KEY)" || true)
        if [ -n "$hits" ]; then
          echo "вњ— Posible secreto en diff:"
          echo "$hits" | head -5
          exit 1
        fi

    infra-refs-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legГ­timamente discuten los
        # patterns como texto de normativa.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md)" || true)
        [ -z "$filtered" ] && exit 0
        hits=$(echo "$filtered" | xargs grep -lnE "\b10\.[0-9]+\.[0-9]+\.[0-9]+|\b192\.168\.[0-9]+\.[0-9]+|\b172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|guatoc-nixos" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "вњ— Refs a infra interna (IP privada o repo privado) en:"
          echo "$hits"
          echo "Ver CONTRIBUTING.md В§1-В§2"
          exit 1
        fi

    strategic-content-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legГ­timamente discuten los
        # patterns como texto de normativa.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md)" || true)
        [ -z "$filtered" ] && exit 0
        # Patrones universales вЂ” identificadores especГ­ficos (codenames de
        # agentes propios, infra interna) viven en chagra-pro/PROHIBITED_INTERNAL.md
        # y se cargan adicionalmente si CHAGRA_PRO_PATH estГЎ set.
        hits=$(echo "$filtered" | xargs grep -lEi "burnout|cap[.-]table|founding[.-]team|valuation|mollison[._-]?adapt|lawton[._-]?curated|ADR-(009|010|014|017|018)\s*\(" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "вњ— Contenido estratГ©gico filtrado al pГєblico en:"
          echo "$hits"
          echo "Ver oss-pro/PROHIBITED_IN_PUBLIC.md secciГіn 'Contenido estratГ©gico'"
          exit 1
        fi
        # Carga PROHIBITED_INTERNAL si estГЎ disponible (dev local con Pro path)
        if [ -n "$CHAGRA_PRO_PATH" ] && [ -f "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md" ]; then
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            hit=$(echo "$filtered" | xargs grep -lE "$pat" 2>/dev/null || true)
            if [ -n "$hit" ]; then
              echo "вњ— Identifier interno en bundle pГєblico:"
              echo "  Pattern: $pat"
              echo "  En: $hit"
              exit 1
            fi
          done < <(awk '/^- `[^`]+`/{ gsub(/^- `|`.*$/,""); print }' "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md")
        fi

    pro-import-scan:
      tags: security
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        hits=$(echo "$files" | xargs grep -lnE "from ['\"](@guatoc/chagra-pro|@chagra/pro-|\.\./chagra-pro|chagra-pro/)" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "вњ— Import estГЎtico desde chagra-pro en src/ вЂ” usar moduleRegistry (ADR-002)"
          echo "$hits"
          exit 1
        fi

    voseo-scan:
      # El filtro runtime (src/services/voseoFilter.js) limpia texto DINГЃMICO
      # (agente), pero NO los strings estГЎticos de la UI. Este guard corre
      # ENCIMA del cГіdigo y bloquea voseo argentino antes de que llegue a prod.
      # Lista curada con tildes literales в†’ cero falsos positivos (cafГ©, estГЎ,
      # acГЎ, JosГ©, ni 1ВЄ persona del pretГ©rito como "elegГ­/comГ­").
      tags: i18n
      glob: "src/**/*.{js,jsx,ts,tsx,json}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Excluye el filtro (contiene patrones), tests, y datos de nombres
        # propios (locations DANE) que dan falsos positivos por substring.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "voseoFilter|__tests__|\.test\.|scan-voseo|colombia-locations|\.dane\." || true)
        [ -z "$filtered" ] && exit 0
        # LГ­mites de palabra que incluyen tildes (evita SГЎcamaв†’sacГЎ, etc.).
        L="a-zA-ZГЎГ©Г­ГіГєГјГ±ГЃГ‰ГЌГ“ГљГњГ‘"
        hits=$(echo "$filtered" | xargs grep -lEi "(^|[^$L])(tenГ©s|querГ©s|podГ©s|sabГ©s|hacГ©s|ponГ©s|venГ­s|decГ­s|vivГ­s|empezГЎ|mirГЎ|probГЎ|sembrГЎ|cuidГЎ|anotГЎ|tocГЎ|hacГ©|ponГ©|dejГЎ|llevГЎ|sacГЎ|buscГЎ|revisГЎ|recogГ©|aprendГ©|mandГЎ|contГЎ|esperГЎ|fijate|quedate|acordate|preparale|usГЎ)([^$L]|\$)" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "вњ— Voseo argentino en strings/cГіdigo (usar tГє/usted Colombia):"
          echo "$hits"
          echo "El filtro runtime NO cubre strings estГЎticos вЂ” corrГ­gelo en la fuente (ver voseoFilter.js)."
          exit 1
        fi

    voseo-scan-code-comments:
      # Complementa voseo-scan (arriba): ese guard mira el ARCHIVO COMPLETO
      # pero solo dentro de src/**. Este guard cubre el hueco real donde el
      # voseo se cuela PR tras PR: comentarios de desarrollador y mensajes de
      # CLI/error en .js/.jsx/.mjs/.ts/.tsx de TODO el repo (scripts/, eval/,
      # tests/, no solo src/). Solo mira LГЌNEAS AGREGADAS del diff (no el
      # archivo completo) porque suma "acГЎ"/"usГЎ" a la lista вЂ” formas que no
      # se banean a nivel de archivo completo por ser ambiguas en prosa de
      # cara al usuario (ver docstring de voseoFilter.js) y por aparecer ya
      # de forma masiva y legГ­tima en comentarios existentes de este repo.
      # Detalle de diseГ±o + lista completa de formas cubiertas:
      # scripts/scan-voseo-comments.mjs.
      tags: i18n
      glob: "*.{js,jsx,mjs,ts,tsx}"
      run: node scripts/scan-voseo-comments.mjs {staged_files}

    eslint:
      glob: "*.{js,jsx,ts,tsx}"
      # public/vendor/** (#2088, modo campo): librerГ­as de terceros vendoreadas
      # TAL CUAL (UMD minificado TF.js/speech-commands). Ya estГЎn en
      # eslint.config.js globalIgnores, pero --max-warnings=0 cuenta el propio
      # warning de "ignorado por patrГіn" вЂ” hay que excluirlas del glob acГЎ
      # tambiГ©n para no romper el commit de un vendor legГ­timo.
      exclude: '\.d\.ts$|^public/vendor/'
      run: npx eslint {staged_files} --max-warnings=0

    # auto-bump-version REMOVIDO 2026-06-02: el bump de versiГіn se moviГі a
    # deploy-time (.github/workflows/deploy.yml в†’ step "Set deploy-time version")
    # para eliminar las colisiones de auto-bump entre PRs paralelos que dejaban
    # la versiГіn pegada (raГ­z del "no actualiza" / label v1.0.32 congelado).
    # El CACHE_NAME del SW lo sigue bumpeando el step post-deploy (per-SHA).

    cycle-content-anti-overpromise:
      # Valida /public/cycle-content/<slug>.json contra rangos agroecolГіgicos
      # colombianos (ADR-032 sec 6). Rechaza overpromise hidropГіnico disfrazado
      # de agroecologГ­a. Solo corre si cambian JSONs de cycle-content.
      glob: "public/cycle-content/*.json"
      run: node scripts/validate-cycle-content.mjs

    catalog-validator:
      # Valida catalog/chagra-catalog-seed-v3.1.json contra schema v3.1 + 8
      # validadores semГЎnticos (AMB-05/10/13/14/15/16/17/18). Modo lenient
      # (sin --seed-mode tras el fix del 2026-05-20): schema errors legacy son
      # warnings (cleanup pendiente), pero AMB-10/11/13/18 son HARD ERRORS вЂ”
      # eso es lo que catchea bugs de generate al momento de commit. Solo corre
      # si cambian catalog/ o schema/.
      glob: "catalog/*.json"
      run: node scripts/validate-catalog.mjs --lenient-schema

commit-msg:
  commands:
    conventional:
      run: |
        pattern='^(feat|fix|chore|docs|refactor|test|perf|build|ci|style|revert)(\([a-z0-9-]+\))?(!)?: .+'
        if ! grep -qE "$pattern" {1} ; then
          echo "вњ— Mensaje no sigue conventional commits."
          echo "  Ejemplos: 'feat(voice): batch mode', 'fix(registry): load order'"
          exit 1
        fi
