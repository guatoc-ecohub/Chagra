# Chagra público — lefthook config
# Instalar: npx lefthook install (corre automáticamente vía postinstall)
# ADR-002 + ADR-015

pre-commit:
  parallel: true
  commands:
    secret-scan:
      tags: security
      run: |
        # Excluye archivos que DEFINEN las reglas (contienen patterns como
        # texto literal, no como secreto real): las listas anti-leak, el
        # propio lefthook, y el CONTRIBUTING.md que las documenta.
        hits=$(git diff --cached -- . ':!oss-pro/PROHIBITED*' ':!lefthook.yml' ':!CONTRIBUTING.md' | grep -iE "(gh[oprsu]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{32,}|sk-ant-[A-Za-z0-9_-]{30,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|glpat-[0-9A-Za-z_-]{20}|BEGIN (RSA|OPENSSH) PRIVATE KEY)" || true)
        if [ -n "$hits" ]; then
          echo "✗ Posible secreto en diff:"
          echo "$hits" | head -5
          exit 1
        fi

    infra-refs-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legítimamente discuten los
        # patterns como texto de normativa.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md)" || true)
        [ -z "$filtered" ] && exit 0
        hits=$(echo "$filtered" | xargs grep -lnE "\b10\.[0-9]+\.[0-9]+\.[0-9]+|\b192\.168\.[0-9]+\.[0-9]+|\b172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|guatoc-nixos" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Refs a infra interna (IP privada o repo privado) en:"
          echo "$hits"
          echo "Ver CONTRIBUTING.md §1-§2"
          exit 1
        fi

    strategic-content-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legítimamente discuten los
        # patterns como texto de normativa.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md)" || true)
        [ -z "$filtered" ] && exit 0
        # Patrones universales — identificadores específicos (codenames de
        # agentes propios, infra interna) viven en chagra-pro/PROHIBITED_INTERNAL.md
        # y se cargan adicionalmente si CHAGRA_PRO_PATH está set.
        hits=$(echo "$filtered" | xargs grep -lEi "burnout|cap[.-]table|founding[.-]team|valuation|mollison[._-]?adapt|lawton[._-]?curated|ADR-(009|010|014|017|018)\s*\(" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Contenido estratégico filtrado al público en:"
          echo "$hits"
          echo "Ver oss-pro/PROHIBITED_IN_PUBLIC.md sección 'Contenido estratégico'"
          exit 1
        fi
        # Carga PROHIBITED_INTERNAL si está disponible (dev local con Pro path)
        if [ -n "$CHAGRA_PRO_PATH" ] && [ -f "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md" ]; then
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            hit=$(echo "$filtered" | xargs grep -lE "$pat" 2>/dev/null || true)
            if [ -n "$hit" ]; then
              echo "✗ Identifier interno en bundle público:"
              echo "  Pattern: $pat"
              echo "  En: $hit"
              exit 1
            fi
          done < <(awk '/^- `[^`]+`/{ gsub(/^- `|`.*$/,""); print }' "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md")
        fi

    pro-import-scan:
      tags: security
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        hits=$(echo "$files" | xargs grep -lnE "from ['\"](@guatoc/chagra-pro|@chagra/pro-|\.\./chagra-pro|chagra-pro/)" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Import estático desde chagra-pro en src/ — usar moduleRegistry (ADR-002)"
          echo "$hits"
          exit 1
        fi

    eslint:
      glob: "*.{js,jsx,ts,tsx}"
      run: npx eslint {staged_files} --max-warnings=0

    auto-bump-version:
      # Auto-bumpea package.json version + sw.js CACHE_NAME en patch si
      # cambian archivos críticos (src/**, public/**) y el dev olvidó
      # hacerlo manual. Evita conflicts en PRs paralelos (sesión 2026-04-30/05-01
      # tuvo ~6 conflicts repetidos en estos 2 archivos).
      # Convención: el dev NO bumpea, el hook sí.
      run: node scripts/auto-bump-version.mjs

commit-msg:
  commands:
    conventional:
      run: |
        pattern='^(feat|fix|chore|docs|refactor|test|perf|build|ci|style|revert)(\([a-z0-9-]+\))?(!)?: .+'
        if ! grep -qE "$pattern" {1} ; then
          echo "✗ Mensaje no sigue conventional commits."
          echo "  Ejemplos: 'feat(voice): batch mode', 'fix(registry): load order'"
          exit 1
        fi
