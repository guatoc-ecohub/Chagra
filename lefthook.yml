# Chagra público — lefthook config
# Instalar: npx lefthook install (corre automáticamente vía postinstall)
# ADR-002 + ADR-015

pre-commit:
  parallel: true
  commands:
    secret-scan:
      tags: security
      run: |
        # Excluye archivos que DEFINEN las reglas (contienen patterns como
        # texto literal, no como secreto real): las listas anti-leak, el
        # propio lefthook, y el CONTRIBUTING.md que las documenta.
        hits=$(git diff --cached -- . ':!oss-pro/PROHIBITED*' ':!lefthook.yml' ':!CONTRIBUTING.md' | grep -iE "(gh[oprsu]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{32,}|sk-ant-[A-Za-z0-9_-]{30,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|glpat-[0-9A-Za-z_-]{20}|BEGIN (RSA|OPENSSH) PRIVATE KEY)" || true)
        if [ -n "$hits" ]; then
          echo "✗ Posible secreto en diff:"
          echo "$hits" | head -5
          exit 1
        fi

    infra-refs-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legítimamente discuten los
        # patterns como texto de normativa.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md)" || true)
        [ -z "$filtered" ] && exit 0
        hits=$(echo "$filtered" | xargs grep -lnE "\b10\.[0-9]+\.[0-9]+\.[0-9]+|\b192\.168\.[0-9]+\.[0-9]+|\b172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|guatoc-nixos" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Refs a infra interna (IP privada o repo privado) en:"
          echo "$hits"
          echo "Ver CONTRIBUTING.md §1-§2"
          exit 1
        fi

    strategic-content-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legítimamente discuten los
        # patterns como texto de normativa.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md)" || true)
        [ -z "$filtered" ] && exit 0
        # Patrones universales — identificadores específicos (codenames de
        # agentes propios, infra interna) viven en chagra-pro/PROHIBITED_INTERNAL.md
        # y se cargan adicionalmente si CHAGRA_PRO_PATH está set.
        hits=$(echo "$filtered" | xargs grep -lEi "burnout|cap[.-]table|founding[.-]team|valuation|mollison[._-]?adapt|lawton[._-]?curated|ADR-(009|010|014|017|018)\s*\(" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Contenido estratégico filtrado al público en:"
          echo "$hits"
          echo "Ver oss-pro/PROHIBITED_IN_PUBLIC.md sección 'Contenido estratégico'"
          exit 1
        fi
        # Carga PROHIBITED_INTERNAL si está disponible (dev local con Pro path)
        if [ -n "$CHAGRA_PRO_PATH" ] && [ -f "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md" ]; then
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            hit=$(echo "$filtered" | xargs grep -lE "$pat" 2>/dev/null || true)
            if [ -n "$hit" ]; then
              echo "✗ Identifier interno en bundle público:"
              echo "  Pattern: $pat"
              echo "  En: $hit"
              exit 1
            fi
          done < <(awk '/^- `[^`]+`/{ gsub(/^- `|`.*$/,""); print }' "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md")
        fi

    pro-import-scan:
      tags: security
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        hits=$(echo "$files" | xargs grep -lnE "from ['\"](@guatoc/chagra-pro|@chagra/pro-|\.\./chagra-pro|chagra-pro/)" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Import estático desde chagra-pro en src/ — usar moduleRegistry (ADR-002)"
          echo "$hits"
          exit 1
        fi

    voseo-scan:
      # El filtro runtime (src/services/voseoFilter.js) limpia texto DINÁMICO
      # (agente), pero NO los strings estáticos de la UI. Este guard corre
      # ENCIMA del código y bloquea voseo argentino antes de que llegue a prod.
      # Lista curada con tildes literales → cero falsos positivos (café, está,
      # acá, José, ni 1ª persona del pretérito como "elegí/comí").
      tags: i18n
      glob: "src/**/*.{js,jsx,ts,tsx,json}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Excluye el filtro (contiene patrones), tests, y datos de nombres
        # propios (locations DANE) que dan falsos positivos por substring.
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "voseoFilter|__tests__|\.test\.|scan-voseo|colombia-locations|\.dane\." || true)
        [ -z "$filtered" ] && exit 0
        # Límites de palabra que incluyen tildes (evita Sácama→sacá, etc.).
        L="a-zA-ZáéíóúüñÁÉÍÓÚÜÑ"
        hits=$(echo "$filtered" | xargs grep -lEi "(^|[^$L])(tenés|querés|podés|sabés|hacés|ponés|venís|decís|vivís|empezá|mirá|probá|sembrá|cuidá|anotá|tocá|hacé|poné|dejá|llevá|sacá|buscá|revisá|recogé|aprendé|mandá|contá|esperá|fijate|quedate|acordate|preparale)([^$L]|\$)" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "✗ Voseo argentino en strings/código (usar tú/usted Colombia):"
          echo "$hits"
          echo "El filtro runtime NO cubre strings estáticos — corrígelo en la fuente (ver voseoFilter.js)."
          exit 1
        fi

    eslint:
      glob: "*.{js,jsx,ts,tsx}"
      exclude: '\.d\.ts$'
      run: npx eslint {staged_files} --max-warnings=0

    # auto-bump-version REMOVIDO 2026-06-02: el bump de versión se movió a
    # deploy-time (.github/workflows/deploy.yml → step "Set deploy-time version")
    # para eliminar las colisiones de auto-bump entre PRs paralelos que dejaban
    # la versión pegada (raíz del "no actualiza" / label v1.0.32 congelado).
    # El CACHE_NAME del SW lo sigue bumpeando el step post-deploy (per-SHA).

    cycle-content-anti-overpromise:
      # Valida /public/cycle-content/<slug>.json contra rangos agroecológicos
      # colombianos (ADR-032 sec 6). Rechaza overpromise hidropónico disfrazado
      # de agroecología. Solo corre si cambian JSONs de cycle-content.
      glob: "public/cycle-content/*.json"
      run: node scripts/validate-cycle-content.mjs

    catalog-validator:
      # Valida catalog/chagra-catalog-seed-v3.1.json contra schema v3.1 + 8
      # validadores semánticos (AMB-05/10/13/14/15/16/17/18). Modo lenient
      # (sin --seed-mode tras el fix del 2026-05-20): schema errors legacy son
      # warnings (cleanup pendiente), pero AMB-10/11/13/18 son HARD ERRORS —
      # eso es lo que catchea bugs de generate al momento de commit. Solo corre
      # si cambian catalog/ o schema/.
      glob: "catalog/*.json"
      run: node scripts/validate-catalog.mjs --lenient-schema

commit-msg:
  commands:
    conventional:
      run: |
        pattern='^(feat|fix|chore|docs|refactor|test|perf|build|ci|style|revert)(\([a-z0-9-]+\))?(!)?: .+'
        if ! grep -qE "$pattern" {1} ; then
          echo "✗ Mensaje no sigue conventional commits."
          echo "  Ejemplos: 'feat(voice): batch mode', 'fix(registry): load order'"
          exit 1
        fi
