# Chagra pĂşblico â€” lefthook config
# Instalar: npx lefthook install (corre automĂˇticamente vĂ­a postinstall)
# ADR-002 + ADR-015

pre-commit:
  parallel: true
  commands:
    secret-scan:
      tags: security
      run: |
        # Excluye archivos que DEFINEN las reglas (contienen patterns como
        # texto literal, no como secreto real): las listas anti-leak, el
        # propio lefthook, y el CONTRIBUTING.md que las documenta.
        hits=$(git diff --cached -- . ':!oss-pro/PROHIBITED*' ':!lefthook.yml' ':!CONTRIBUTING.md' | grep -iE "(gh[oprsu]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{32,}|sk-ant-[A-Za-z0-9_-]{30,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|glpat-[0-9A-Za-z_-]{20}|BEGIN (RSA|OPENSSH) PRIVATE KEY)" || true)
        if [ -n "$hits" ]; then
          echo "âś— Posible secreto en diff:"
          echo "$hits" | head -5
          exit 1
        fi

    infra-refs-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legĂ­timamente discuten los
        # patterns como texto de normativa, + JSONs de catĂˇlogo (task #199).
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md|data/catalog/regional-labels-.*\.json)" || true)
        [ -z "$filtered" ] && exit 0
        hits=$(echo "$filtered" | xargs grep -lnE "\b10\.[0-9]+\.[0-9]+\.[0-9]+|\b192\.168\.[0-9]+\.[0-9]+|\b172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+|guatoc-nixos" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "âś— Refs a infra interna (IP privada o repo privado) en:"
          echo "$hits"
          echo "Ver CONTRIBUTING.md Â§1-Â§2"
          exit 1
        fi

    strategic-content-scan:
      tags: security
      glob: "*.{md,js,jsx,ts,tsx,json,yaml,yml}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        # Filtra archivos de reglas + docs que legĂ­timamente discuten los
        # patterns como texto de normativa, + JSONs de catĂˇlogo (task #199).
        filtered=$(echo "$files" | tr ' ' '\n' | grep -vE "^(oss-pro/PROHIBITED|lefthook\.yml|oss-pro/README\.md|CONTRIBUTING\.md|AGENTS\.md|data/catalog/regional-labels-.*\.json)" || true)
        [ -z "$filtered" ] && exit 0
        # Patrones universales â€” identificadores especĂ­ficos (codenames de
        # agentes propios, infra interna) viven en chagra-pro/PROHIBITED_INTERNAL.md
        # y se cargan adicionalmente si CHAGRA_PRO_PATH estĂˇ set.
        hits=$(echo "$filtered" | xargs grep -lEi "burnout|cap[.-]table|founding[.-]team|valuation|mollison[._-]?adapt|lawton[._-]?curated|ADR-(009|010|014|017|018)\s*\(" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "âś— Contenido estratĂ©gico filtrado al pĂşblico en:"
          echo "$hits"
          echo "Ver oss-pro/PROHIBITED_IN_PUBLIC.md secciĂłn 'Contenido estratĂ©gico'"
          exit 1
        fi
        # Carga PROHIBITED_INTERNAL si estĂˇ disponible (dev local con Pro path)
        if [ -n "$CHAGRA_PRO_PATH" ] && [ -f "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md" ]; then
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            hit=$(echo "$filtered" | xargs grep -lE "$pat" 2>/dev/null || true)
            if [ -n "$hit" ]; then
              echo "âś— Identifier interno en bundle pĂşblico:"
              echo "  Pattern: $pat"
              echo "  En: $hit"
              exit 1
            fi
          done < <(awk '/^- `[^`]+`/{ gsub(/^- `|`.*$/,""); print }' "$CHAGRA_PRO_PATH/PROHIBITED_INTERNAL.md")
        fi

    pro-import-scan:
      tags: security
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: |
        files="{staged_files}"
        [ -z "$files" ] && exit 0
        hits=$(echo "$files" | xargs grep -lnE "from ['\"](@guatoc/chagra-pro|@chagra/pro-|\.\./chagra-pro|chagra-pro/)" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "âś— Import estĂˇtico desde chagra-pro en src/ â€” usar moduleRegistry (ADR-002)"
          echo "$hits"
          exit 1
        fi

    eslint:
      glob: "*.{js,jsx,ts,tsx}"
      exclude: '\.d\.ts$'
      run: npx eslint {staged_files} --max-warnings=0

    auto-bump-version:
      # Auto-bumpea package.json version + sw.js CACHE_NAME en patch si
      # cambian archivos crĂ­ticos (src/**, public/**) y el dev olvidĂł
      # hacerlo manual. Evita conflicts en PRs paralelos (sesiĂłn 2026-04-30/05-01
      # tuvo ~6 conflicts repetidos en estos 2 archivos).
      # ConvenciĂłn: el dev NO bumpea, el hook sĂ­.
      run: node scripts/auto-bump-version.mjs

    cycle-content-anti-overpromise:
      # Valida /public/cycle-content/<slug>.json contra rangos agroecolĂłgicos
      # colombianos (ADR-032 sec 6). Rechaza overpromise hidropĂłnico disfrazado
      # de agroecologĂ­a. Solo corre si cambian JSONs de cycle-content.
      glob: "public/cycle-content/*.json"
      run: node scripts/validate-cycle-content.mjs

    catalog-validator:
      # Valida catalog/chagra-catalog-seed-v3.1.json contra schema v3.1 + 8
      # validadores semĂˇnticos (AMB-05/10/13/14/15/16/17/18). Modo lenient
      # (sin --seed-mode tras el fix del 2026-05-20): schema errors legacy son
      # warnings (cleanup pendiente), pero AMB-10/11/13/18 son HARD ERRORS â€”
      # eso es lo que catchea bugs de generate al momento de commit. Solo corre
      # si cambian catalog/ o schema/.
      glob: "catalog/*.json"
      run: node scripts/validate-catalog.mjs --lenient-schema

commit-msg:
  commands:
    conventional:
      run: |
        pattern='^(feat|fix|chore|docs|refactor|test|perf|build|ci|style|revert)(\([a-z0-9-]+\))?(!)?: .+'
        if ! grep -qE "$pattern" {1} ; then
          echo "âś— Mensaje no sigue conventional commits."
          echo "  Ejemplos: 'feat(voice): batch mode', 'fix(registry): load order'"
          exit 1
        fi
