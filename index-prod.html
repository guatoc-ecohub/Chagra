<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:title" content="Chagra — Su finca en 3D" />
    <meta name="description" content="Chagra — la app que le habla a su finca. Explore el valle 3D, preguntele al agente. Hecha en Colombia, para el campo." />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https:;
      style-src 'self' 'unsafe-inline' https:;
      img-src 'self' data: blob: https:;
      connect-src 'self' https: wss:;
      font-src 'self' data:;
      media-src 'self' blob:;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <link rel="preload" href="/fonts/baloo2-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/nunito-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chagra" />
    <title>Chagra</title>
    <style>
      /* La CADENA DE ALTURA del shell (bug del feedback 2026-07-14): los
         mundos 3D piden height:100% y lo heredaban de NADA → #root colapsaba
         y la escena quedaba aplastada en una franja (~18% del alto). Esto
         explica el Ent "cortado y pequeñísimo" y el grafo "plano". */
      html, body, #root { height: 100%; background: #020617; margin: 0; }
      body { min-height: 100dvh; }
      #root { display: flex; flex-direction: column; }
      #root > * { flex: 1 1 auto; min-height: 0; }
      #pre-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #020617;
        color: #34d399;
        font-family: system-ui, -apple-system, sans-serif;
        z-index: 9999;
        transition: opacity 200ms ease-out;
      }
      #pre-loader .pl-emoji {
        font-size: 48px; line-height: 1;
        animation: pl-grow 1.6s ease-in-out infinite;
      }
      #pre-loader .pl-text {
        margin-top: 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #6ee7b7;
        opacity: 0.85;
      }
      @keyframes pl-grow {
        0%, 100% { transform: scale(0.85); opacity: 0.7; }
        50%      { transform: scale(1.05); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #pre-loader .pl-emoji { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="pre-loader" aria-label="Cargando Chagra">
      <span class="pl-emoji" aria-hidden="true">🌱</span>
      <span class="pl-text">Chagra</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main-prod.jsx"></script>
    <script>
      (function () {
        var root = document.getElementById('root');
        var loader = document.getElementById('pre-loader');
        if (!root || !loader) return;
        var done = function () {
          loader.style.opacity = '0';
          setTimeout(function () { loader.remove(); }, 220);
        };
        var obs = new MutationObserver(function () {
          if (root.children.length > 0) {
            obs.disconnect();
            done();
          }
        });
        obs.observe(root, { childList: true });
        setTimeout(function () { obs.disconnect(); done(); }, 5000);
      })();
    </script>
  </body>
</html>
